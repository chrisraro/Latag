<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Warehouse Console: stencil-cut price tag, app icon mark -->
  <g id="background">
    <rect x="0" y="0" width="512" height="512" fill="#000000"/>
  </g>

  <g id="tag" transform="translate(256,256) rotate(-12) scale(0.88)">
    <!-- tip block: pointed stencil segment -->
    <polygon points="-160,0 -128,-27.6 -128,27.6" fill="#B8F135"/>

    <!-- shoulder block: tapered segment with punched square eyelet -->
    <polygon points="-112,-41.5 -66,-81.2 -66,81.2 -112,41.5" fill="#B8F135"/>
    <rect x="-109" y="-20" width="40" height="40" fill="#000000"/>

    <!-- body block 1 -->
    <rect x="-50" y="-95" width="56" height="190" fill="#B8F135"/>

    <!-- body block 2 -->
    <rect x="22" y="-95" width="70" height="190" fill="#B8F135"/>

    <!-- trailing block: closes the tag, carries stamp accent -->
    <rect x="108" y="-95" width="52" height="190" fill="#B8F135"/>
    <rect x="120" y="-83" width="26" height="26" fill="#F2F2F2"/>
  </g>
</svg>
